<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shira's Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --rust: #c94a2e;
    --gold: #b8860b;
    --muted: #7a7167;
    --border: #d4cec2;
    --card-bg: #faf7f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* MASTHEAD */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0;
    border-bottom: 3px solid var(--rust);
  }

  .masthead-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px 16px;
    display: flex;
    align-items: baseline;
    gap: 24px;
    flex-wrap: wrap;
  }

  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  .masthead-title span {
    color: var(--rust);
  }

  .masthead-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .masthead-meta strong {
    color: var(--paper);
    font-weight: 500;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    max-width: 100%;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .toolbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--rust); color: var(--rust); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 5px 12px 5px 32px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    border-radius: 3px;
    color: var(--ink);
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--rust); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* LOADING */
  .loading-screen {
    max-width: 1400px;
    margin: 60px auto;
    padding: 0 24px;
    text-align: center;
  }

  .loading-bar-wrap {
    width: 400px;
    max-width: 100%;
    margin: 20px auto;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: var(--rust);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }

  .loading-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* MAIN LAYOUT */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* RIVER LAYOUT */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .river {
    max-width: 100%;
  }

  /* DAY DIVIDER */
  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 36px 0 6px;
  }
  .day-divider:first-child { margin-top: 0; }
  .day-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .day-line { flex: 1; height: 1px; background: var(--border); }

  /* RIVER ITEM */
  .river-item {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.22s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-5px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .river-time {
    width: 52px;
    flex-shrink: 0;
    padding: 17px 12px 14px 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
  }

  .river-line-col {
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .river-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--rust);
    border: 2px solid var(--paper);
    position: absolute;
    top: 17px;
    left: 50%;
    transform: translateX(-50%);
  }
  .river-item.bluesky-item .river-dot { background: #4a90d9; }

  .river-body {
    flex: 1;
    padding: 13px 0 13px 18px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
  }

  .river-source {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--rust);
  }
  .river-item.bluesky-item .river-source { color: #4a90d9; }

  .river-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    text-decoration: none;
    display: block;
    transition: color 0.15s;
  }
  .river-title:hover { color: var(--rust); }
  .river-item.bluesky-item .river-title:hover { color: #4a90d9; }

  .river-summary {
    font-size: 13px;
    line-height: 1.65;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* COMPACT / HEADLINE MODE */
  .river.compact .river-summary { display: none; }
  .river.compact .river-body { gap: 3px; padding: 9px 0 9px 18px; }
  .river.compact .river-time { padding-top: 11px; }
  .river.compact .river-dot { top: 11px; }
  .river.compact .river-title { font-size: 15px; }

  /* MARK ALL READ button — same style as hide-read-btn */
  .mark-all-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .mark-all-btn:hover { border-color: var(--rust); color: var(--rust); }

  /* COMPACT TOGGLE button */
  .compact-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .compact-btn:hover { border-color: var(--rust); color: var(--rust); }
  .compact-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* KEYBOARD HINT tooltip */
  .kbd-hint {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    letter-spacing: 0.04em;
  }

  /* READ STATE */
  .river-item.read {
    opacity: 0.38;
    transition: opacity 0.2s;
  }
  .river-item.read:hover { opacity: 0.65; }
  .river-item.read .river-title { color: var(--muted); }
  .river-item.hidden { display: none; }

  .read-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 20px;
    margin-left: 6px;
    flex-shrink: 0;
  }

  .hide-read-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
    display: none;
  }
  .hide-read-btn.visible { display: inline-block; }
  .hide-read-btn:hover { border-color: var(--rust); color: var(--rust); }
  .hide-read-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ERROR / EMPTY */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    max-width: 700px;
    margin: 0 auto;
  }
  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; }

  @media (max-width: 600px) {
    .river-time { width: 36px; font-size: 9px; }
    .river-title { font-size: 15px; }
    .masthead-title { font-size: 30px; }
  }

  /* STATUS BAR */
  .status-bar {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 6px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .status-bar-inner {
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4caf6a;
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    margin-left: auto;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--rust); color: var(--rust); }

  /* SPINNER */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }


</style>
</head>
<body>

<header>
  <div class="masthead-inner">
    <div class="masthead-title">Shira<span>'s</span> Reader</div>
    <div class="masthead-meta">
      <span id="feed-date">Loading...</span>
      <span><strong id="total-count">—</strong> sources · <strong id="article-count">—</strong> articles</span>
    </div>
  </div>
</header>

<div class="status-bar">
  <div class="status-bar-inner">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Fetching feeds...</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAllFeeds()">↻ Refresh</button>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('daily', this)">Daily Reads</button>
    <button class="filter-btn" onclick="setFilter('bluesky', this)">BlueSky</button>
    <button class="filter-btn" onclick="setFilter('nyt', this)">NYT</button>
    <button class="filter-btn" onclick="setFilter('wapo', this)">WaPo</button>
    <button class="filter-btn" onclick="setFilter('wsj', this)">WSJ</button>
    <button class="filter-btn" onclick="setFilter('bloomberg', this)">Bloomberg</button>
    <button class="filter-btn" onclick="setFilter('newsletters', this)">Newsletters</button>
    <button class="filter-btn" onclick="setFilter('bi', this)">BI</button>
    <button class="filter-btn" onclick="setFilter('techmeme', this)">Techmeme</button>
    <button class="hide-read-btn" id="hide-read-btn" onclick="toggleHideRead()">Hide Read</button>
    <button class="mark-all-btn" id="mark-all-btn" onclick="markAllRead()">Mark All Read</button>
    <button class="filter-btn" onclick="setFilter('reuters', this)">Reuters</button>
    <button class="compact-btn" id="compact-btn" onclick="toggleCompact()">Headlines</button>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search articles..." oninput="filterBySearch()" />
    </div>
  </div>
</div>

<div class="layout" id="main-layout">
  <div class="loading-screen" id="loading-screen">
    <div style="font-family:'Playfair Display',serif; font-size:24px; font-weight:700;">Fetching your feeds&hellip;</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-label" id="loading-label">Connecting to sources</div>
  </div>
</div>

// State

// Read state — persisted in localStorage
const STORAGE_KEY = 'shira-reader-read';
function getReadSet() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function markRead(id) {
  const s = getReadSet();
  s.add(id);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...s])); } catch {}
  updateReadUI();
}
function isRead(id) { return getReadSet().has(id); }
function articleId(a) {
  // Stable ID from link, falling back to title
  return a.link && a.link !== '#' ? a.link : a.title.slice(0, 80);
}
function updateReadUI() {
  const readCount = document.querySelectorAll('.river-item.read').length;
  const btn = document.getElementById('hide-read-btn');
  if (btn) {
    btn.classList.toggle('visible', readCount > 0);
    btn.textContent = hideRead ? `Show All (${readCount} read)` : `Hide Read (${readCount})`;
    btn.classList.toggle('active', hideRead);
  }
}
function toggleHideRead() {
  hideRead = !hideRead;
  document.querySelectorAll('.river-item.read').forEach(el => {
    el.classList.toggle('hidden', hideRead);
  });
  updateReadUI();
}

// ── FETCH via multiple proxy fallbacks ────────────────────────────────────────
async function fetchFeed(feed) {
  const encodedUrl = encodeURIComponent(feed.url);

  // Try multiple proxies in order
  const proxies = [
    () => fetchViaRssBridge(feed.url),
    () => fetchViaAllOrigins(feed.url),
    () => fetchViaCorsproxy(feed.url),
  ];

  for (const tryProxy of proxies) {
    try {
      const items = await tryProxy();
      if (items && items.length > 0) {
        return items.map(item => ({
          title: item.title || '',
          link: item.link || item.guid || '#',
          summary: stripHtml(item.description || item.content || item.summary || ''),
          date: item.pubDate || item.published ? new Date(item.pubDate || item.published) : null,
          source: feed.title,
          category: feed.category,
          tags: feed.tags || [],
        }));
      }
    } catch (e) { /* try next */ }
  }
  return [];
}

async function fetchViaRssBridge(url) {
  // Use rss2json - free tier, works for most feeds
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=8&api_key=`;
  const res = await fetch(api, { signal: AbortSignal.timeout(5000) });
  const data = await res.json();
  if (data.status !== 'ok' || !data.items?.length) throw new Error('no items');
  return data.items;
}

async function fetchViaAllOrigins(url) {
  // allorigins.win proxies raw content
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy, { signal: AbortSignal.timeout(5000) });
  const data = await res.json();
  if (!data.contents) throw new Error('empty');
  return parseRssXml(data.contents);
}

async function fetchViaCorsproxy(url) {
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(proxy, { signal: AbortSignal.timeout(5000) });
  const text = await res.text();
  return parseRssXml(text);
}

function parseRssXml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const items = [];

  // RSS
  doc.querySelectorAll('item').forEach(item => {
    items.push({
      title: item.querySelector('title')?.textContent || '',
      link: item.querySelector('link')?.textContent || item.querySelector('guid')?.textContent || '#',
      description: item.querySelector('description')?.textContent || item.querySelector('content\\:encoded')?.textContent || '',
      pubDate: item.querySelector('pubDate')?.textContent || '',
    });
  });

  // Atom
  if (items.length === 0) {
    doc.querySelectorAll('entry').forEach(entry => {
      const linkEl = entry.querySelector('link[rel="alternate"]') || entry.querySelector('link');
      items.push({
        title: entry.querySelector('title')?.textContent || '',
        link: linkEl?.getAttribute('href') || '#',
        description: entry.querySelector('summary')?.textContent || entry.querySelector('content')?.textContent || '',
        pubDate: entry.querySelector('published')?.textContent || entry.querySelector('updated')?.textContent || '',
      });
    });
  }

  if (!items.length) throw new Error('no items parsed');
  return items.slice(0, 8);
}

function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim().slice(0, 300);
}

function relativeDate(d) {
  if (!d) return '';
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── LOAD ALL ───────────────────────────────────────────────────────────────────
async function loadAllFeeds() {
  allArticles = [];
  loadedCount = 0;
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('status-text').textContent = 'Fetching feeds...';
  document.getElementById('status-dot').style.background = '#f0a030';
  document.getElementById('refresh-btn').innerHTML = '<span class="spin">↻</span> Loading';
  document.getElementById('main-layout').innerHTML = `<div class="loading-screen" id="loading-screen">
    <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;">Fetching your feeds&hellip;</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-label" id="loading-label">Connecting to sources</div>
  </div>`;

  const BATCH = 20;
  for (let i = 0; i < FEEDS.length; i += BATCH) {
    const batch = FEEDS.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(f => fetchFeed(f).catch(() => [])));
    results.forEach(articles => { allArticles.push(...articles); });
    loadedCount = Math.min(i + BATCH, FEEDS.length);
    const pct = Math.round((loadedCount / FEEDS.length) * 100);
    const bar = document.getElementById('loading-bar');
    const label = document.getElementById('loading-label');
    if (bar) bar.style.width = pct + '%';
    const soFar = allArticles.length;
    if (label) label.textContent = `${loadedCount} / ${FEEDS.length} sources · ${soFar} articles so far`;
  }

  // Sort by date, newest first
  allArticles.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return b.date - a.date;
  });

  // Deduplicate by title similarity
  const seen = new Set();
  allArticles = allArticles.filter(a => {
    const key = a.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  document.getElementById('total-count').textContent = FEEDS.length;
  document.getElementById('article-count').textContent = allArticles.length;
  document.getElementById('feed-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('status-dot').style.background = '#4caf6a';
  document.getElementById('status-text').textContent = `${allArticles.length} articles loaded · last updated ${new Date().toLocaleTimeString()}`;
  document.getElementById('refresh-btn').textContent = '↻ Refresh';

  renderArticles();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderArticles() {
  const layout = document.getElementById('main-layout');

  let filtered = allArticles.filter(a => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'daily') return a.category === 'daily';
    if (currentFilter === 'bluesky') return a.category === 'bluesky';
    if (['nyt','wapo','wsj','bloomberg','newsletters','bi','reuters','techmeme'].includes(currentFilter))
      return a.tags && a.tags.includes(currentFilter);
    return true;
  });

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.source.toLowerCase().includes(q) ||
      a.summary.toLowerCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    layout.innerHTML = `<div class="empty-state"><h3>No articles found</h3><p>Try a different filter or search term.</p></div>`;
    return;
  }

  // Group by day for dividers
  const groups = {};
  filtered.forEach(a => {
    const key = a.date
      ? a.date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
      : 'Undated';
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  });

  let html = '<div class="river">';
  let itemIdx = 0;

  Object.entries(groups).forEach(([day, articles]) => {
    html += `<div class="day-divider"><span class="day-label">${day}</span><div class="day-line"></div></div>`;
    articles.forEach(a => {
      const isBsky = a.category === 'bluesky';
      const timeStr = a.date
        ? a.date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase()
        : '';
      const delay = Math.min(itemIdx * 18, 300);
      const aid = articleId(a);
      const read = isRead(aid);
      const hiddenClass = (read && hideRead) ? ' hidden' : '';
      html += `<div class="river-item${isBsky ? ' bluesky-item' : ''}${read ? ' read' : ''}${hiddenClass}" data-id="${aid.replace(/"/g,'&quot;')}" style="animation-delay:${delay}ms">
        <div class="river-time">${timeStr}</div>
        <div class="river-line-col"><div class="river-dot"></div></div>
        <div class="river-body">
          <div class="river-source">${a.source}${read ? '<span class="read-badge">read</span>' : ''}</div>
          <a href="${a.link}" target="_blank" rel="noopener" class="river-title" onclick="handleArticleClick(this)">${a.title}</a>
          ${a.summary ? `<div class="river-summary">${a.summary}</div>` : ''}
        </div>
      </div>`;
      itemIdx++;
    });
  });

  html += '</div>';
  layout.innerHTML = html;
  updateReadUI();
}

// ── READ HANDLER ──────────────────────────────────────────────────────────────
function handleArticleClick(linkEl) {
  const item = linkEl.closest('.river-item');
  if (!item) return;
  const id = item.dataset.id;
  markRead(id);
  item.classList.add('read');
  // Add read badge if not already there
  const sourcEl = item.querySelector('.river-source');
  if (sourcEl && !sourcEl.querySelector('.read-badge')) {
    const badge = document.createElement('span');
    badge.className = 'read-badge';
    badge.textContent = 'read';
    sourcEl.appendChild(badge);
  }
  if (hideRead) {
    setTimeout(() => item.classList.add('hidden'), 400);
  }
}

// ── MARK ALL READ ─────────────────────────────────────────────────────────────
function markAllRead() {
  const items = document.querySelectorAll('.river-item:not(.read)');
  const s = getReadSet();
  items.forEach(item => {
    const id = item.dataset.id;
    if (id) {
      s.add(id);
      item.classList.add('read');
      const srcEl = item.querySelector('.river-source');
      if (srcEl && !srcEl.querySelector('.read-badge')) {
        const badge = document.createElement('span');
        badge.className = 'read-badge';
        badge.textContent = 'read';
        srcEl.appendChild(badge);
      }
    }
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...s])); } catch {}
  if (hideRead) {
    document.querySelectorAll('.river-item.read').forEach(el => el.classList.add('hidden'));
  }
  updateReadUI();
}

// ── COMPACT MODE ───────────────────────────────────────────────────────────────
function toggleCompact() {
  compactMode = !compactMode;
  const river = document.querySelector('.river');
  if (river) river.classList.toggle('compact', compactMode);
  const btn = document.getElementById('compact-btn');
  if (btn) btn.classList.toggle('active', compactMode);
}

// ── KEYBOARD NAVIGATION ────────────────────────────────────────────────────────
function getVisibleItems() {
  return [...document.querySelectorAll('.river-item:not(.hidden)')];
}

function setFocused(idx) {
  const items = getVisibleItems();
  if (!items.length) return;
  // Remove previous focus highlight
  items.forEach(el => el.style.outline = '');
  focusedIndex = Math.max(0, Math.min(idx, items.length - 1));
  const el = items[focusedIndex];
  el.style.outline = '2px solid var(--rust)';
  el.style.outlineOffset = '-2px';
  el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

document.addEventListener('keydown', e => {
  // Don't trigger when typing in search
  if (document.activeElement === document.getElementById('search-input')) return;
  const items = getVisibleItems();
  switch(e.key) {
    case 'j':
    case 'ArrowDown':
      e.preventDefault();
      setFocused(focusedIndex < 0 ? 0 : focusedIndex + 1);
      break;
    case 'k':
    case 'ArrowUp':
      e.preventDefault();
      setFocused(focusedIndex <= 0 ? 0 : focusedIndex - 1);
      break;
    case 'o':
    case 'Enter':
      if (focusedIndex >= 0 && items[focusedIndex]) {
        const link = items[focusedIndex].querySelector('.river-title');
        if (link) { handleArticleClick(link); window.open(link.href, '_blank'); }
      }
      break;
    case 'r':
      if (focusedIndex >= 0 && items[focusedIndex]) {
        const link = items[focusedIndex].querySelector('.river-title');
        if (link) handleArticleClick(link);
      }
      break;
    case 'm':
      markAllRead();
      break;
    case 'h':
      toggleCompact();
      break;
  }
});

// ── FILTER + SEARCH ────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

function filterBySearch() {
  currentSearch = document.getElementById('search-input').value;
  renderArticles();
}

// ── INIT ───────────────────────────────────────────────────────────────────────
loadAllFeeds();
